name: CI Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  linux-tests:
    name: linux
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Dependencies
      run: |
        sudo apt update
        sudo apt install -y libboost-program-options-dev build-essential pkg-config
        
    - name: Run make install
      run: make install
      
    - name: Run make test_loco
      run: make test_loco

  mac-tests:
    name: macos
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Dependencies
      run: |
        brew update
        brew install boost
        
    - name: Run make install
      run: make install
      
    - name: Run make test_loco
      run: make test_loco

  windows-tests:
    name: windows
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Run make install
      run: make install
      
    - name: Run make test_loco
      run: make test_loco
