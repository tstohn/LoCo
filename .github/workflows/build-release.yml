name: Build LoCo Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt install -y build-essential libigraph-dev libboost-iostreams-dev libboost-program-options-dev gfortran libarpack2-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install igraph boost gfortran arpack

      - name: Build LoCo
        run: |
          make loco
          mkdir -p release

          if [ "$RUNNER_OS" = "Linux" ]; then
            cp bin/loco release/loco-linux
          else
            cp bin/loco release/loco-macos
          fi

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: LoCo ${{ github.ref_name }}
          body: Precompiled binaries for Linux, macOS, and Windows.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload binaries
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
